[phases.setup]
nixPkgs = ["python3", "nodejs_22", "ffmpeg", "curl"]

[phases.build]
cmds = [
  "curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp",
  "chmod +x /usr/local/bin/yt-dlp",
  "/usr/local/bin/yt-dlp --version",
  "ln -sf /root/.nix-profile/bin/node /usr/local/bin/node"
]

[phases.install]
cmds = ["npm install"]

[start]
cmd = "node server.js"